<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — LivePool</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f0f4f8;">

<div class="login-card">
  <h2 style="text-align:center;margin-bottom:24px;">📺 LivePool</h2>

  <!-- Step 1: username / password -->
  <div id="step-login">
    <form method="post" action="/api/auth/login" id="login-form">
      <label for="username">用户名</label>
      <input type="text" id="username" name="username" placeholder="用户名" required autofocus>
      <label for="password">密码</label>
      <input type="password" id="password" name="password" placeholder="密码" required>
      <label class="toggle-label" style="margin-top:8px;justify-content:center;">
        <input type="checkbox" id="remember-me" name="remember_me" value="true" checked>
        <span class="toggle-text" style="font-size:13px;">记住登录状态（30 天）</span>
      </label>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:12px;">登 录</button>
    </form>
    <p style="text-align:center;margin-top:16px;">
      <a href="#" onclick="showRegister();return false;" style="font-size:13px;color:var(--text-muted);">没有账号？去注册</a>
    </p>
  </div>

  <!-- Register: new user registration -->
  <div id="step-register" style="display:none;">
    <form id="register-form">
      <label for="reg-username">用户名</label>
      <input type="text" id="reg-username" placeholder="用户名" required>
      <label for="reg-password">密码</label>
      <input type="password" id="reg-password" placeholder="密码" required>
      <label for="reg-confirm">确认密码</label>
      <input type="password" id="reg-confirm" placeholder="再次输入密码" required>
      <label for="reg-code">邀请码</label>
      <div style="display:flex;gap:8px;">
        <input type="text" id="reg-code" placeholder="邀请码" required style="flex:1;">
        <span id="reg-code-status" style="align-self:center;font-size:16px;"></span>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:12px;">注 册</button>
    </form>
    <p style="text-align:center;margin-top:16px;">
      <a href="#" onclick="showLogin();return false;" style="font-size:13px;color:var(--text-muted);">已有账号？去登录</a>
    </p>
  </div>

  <!-- Step 2: TOTP code verify (for existing 2FA users) -->
  <div id="step-tfa" style="display:none;">
    <p style="text-align:center;margin-bottom:16px;">请输入验证器 App 中的 6 位动态码</p>
    <form method="post" action="/api/auth/login/2fa" id="tfa-form">
      <input type="hidden" id="temp-token" name="temp_token" value="">
      <label for="totp-code">动态验证码</label>
      <input type="text" id="totp-code" name="totp_code" placeholder="000000" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" maxlength="6" required autofocus>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:12px;">验 证</button>
    </form>
    <p style="text-align:center;margin-top:12px;">
      <a href="#" onclick="backToLogin();return false;" style="font-size:13px;color:var(--text-muted);">← 返回上一步</a>
    </p>
  </div>

  <!-- Step 3: Forced 2FA setup (force_2fa = true, not yet configured) -->
  <div id="step-tfa-setup" style="display:none;">
    <p style="text-align:center;margin-bottom:12px;font-weight:600;">📱 管理员要求您绑定二次验证器</p>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">
      请使用 Google Authenticator、Authy 等 App 扫描下方二维码（或手动输入密钥），然后输入 App 中显示的 6 位动态码完成绑定。
    </p>
    <div id="tfa-setup-qr" style="text-align:center;margin-bottom:12px;">
      <div style="padding:16px;background:#fff;display:inline-block;border-radius:8px;">加载中...</div>
    </div>
    <div style="font-size:12px;margin-bottom:16px;text-align:center;">
      <span style="color:var(--text-muted);">密钥：</span>
      <code id="tfa-setup-secret" style="word-break:break-all;"></code>
    </div>
    <label for="tfa-setup-code">动态验证码</label>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <input type="text" id="tfa-setup-code" placeholder="000000" inputmode="numeric" pattern="[0-9]*" maxlength="6" style="flex:1;text-align:center;font-size:18px;letter-spacing:4px;">
      <button class="btn btn-primary" onclick="completeTfaSetup()">验证并绑定</button>
    </div>
    <div id="tfa-setup-error" style="color:var(--danger);font-size:13px;margin-top:8px;text-align:center;display:none;"></div>
  </div>

  <!-- Step 4: Backup codes display (after forced setup) -->
  <div id="step-tfa-backup" style="display:none;">
    <p style="text-align:center;margin-bottom:12px;font-weight:600;color:var(--success);">✅ 二次验证已绑定成功！</p>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:8px;">
      ⚠️ 请立即保存以下恢复码。每个恢复码只能使用一次。
    </p>
    <div style="background:#f8f9fa;border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:12px;">
      <pre id="tfa-backup-display" style="font-size:14px;font-family:monospace;text-align:center;line-height:2;"></pre>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-sm btn-primary" onclick="copyBackupCodes()">复制恢复码</button>
      <button class="btn btn-sm btn-outline" onclick="downloadBackupCodes()">下载</button>
      <button class="btn btn-sm btn-outline" onclick="finishLogin()" style="font-weight:600;">进入仪表盘 →</button>
    </div>
  </div>

  <div id="error" style="color:var(--danger);text-align:center;margin-top:12px;display:none;"></div>
</div>

<script>
const $ = id => document.getElementById(id);

function showError(msg) {
  $('error').textContent = msg;
  $('error').style.display = 'block';
}

function backToLogin() {
  $('step-login').style.display = 'block';
  $('step-tfa').style.display = 'none';
  $('error').style.display = 'none';
}

// ---- Step 1: username / password ----
$('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const data = new FormData(this);
  $('error').style.display = 'none';
  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      body: new URLSearchParams(data),
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    });
    if (resp.redirected) { window.location = resp.url; return; }

    const json = await resp.json();

    if (json['2fa_setup_required']) {
      // Forced 2FA setup: show QR binding
      $('step-login').style.display = 'none';
      $('step-tfa-setup').style.display = 'block';
      $('temp-token').value = json.temp_token;
      loadTfaSetup(json.temp_token);
      return;
    }

    if (json['2fa_required']) {
      // Existing 2FA: show code input
      $('step-login').style.display = 'none';
      $('step-tfa').style.display = 'block';
      $('temp-token').value = json.temp_token;
      $('totp-code').focus();
      return;
    }

    if (resp.ok) { window.location = '/'; return; }
    showError(json.detail || 'Login failed');
  } catch(e) {
    showError('Network error');
  }
});

// ---- Step 2: verify existing 2FA code ----
$('tfa-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const data = new FormData(this);
  $('error').style.display = 'none';
  try {
    const resp = await fetch('/api/auth/login/2fa', {
      method: 'POST',
      body: new URLSearchParams(data),
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    });
    if (resp.redirected) { window.location = resp.url; return; }
    if (resp.ok) { window.location = '/'; return; }
    const json = await resp.json();
    if (json.detail && json.detail.includes('expired')) {
      backToLogin();
      showError('临时令牌已过期，请重新登录');
    } else {
      showError(json.detail || '验证失败');
    }
  } catch(e) {
    showError('Network error');
  }
});

// ---- Step 3: forced 2FA setup ----
let _setupSecret = '';

async function loadTfaSetup(tempToken) {
  $('tfa-setup-error').style.display = 'none';
  $('tfa-setup-code').value = '';
  $('tfa-setup-qr').innerHTML = '<div style="padding:16px;">加载中...</div>';
  try {
    const resp = await fetch('/api/auth/login/2fa/setup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({temp_token: tempToken}),
    });
    const data = await resp.json();
    if (!resp.ok) {
      $('tfa-setup-qr').innerHTML = '<span style="color:var(--danger);">' + (data.detail || '加载失败') + '</span>';
      return;
    }
    _setupSecret = data.secret;
    $('tfa-setup-qr').innerHTML = data.qr_svg;
    $('tfa-setup-secret').textContent = data.secret;
    $('tfa-setup-code').focus();
  } catch(e) {
    $('tfa-setup-qr').innerHTML = '<span style="color:var(--danger);">网络错误</span>';
  }
}

async function completeTfaSetup() {
  const code = $('tfa-setup-code').value.trim();
  if (!code || code.length < 6) {
    $('tfa-setup-error').textContent = '请输入 6 位验证码';
    $('tfa-setup-error').style.display = 'block';
    return;
  }
  $('tfa-setup-error').style.display = 'none';

  try {
    const resp = await fetch('/api/auth/login/2fa/complete', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        temp_token: $('temp-token').value,
        secret: _setupSecret,
        code: code,
      }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      $('tfa-setup-error').textContent = data.detail || '验证失败';
      $('tfa-setup-error').style.display = 'block';
      return;
    }

    // 2FA enabled, backup codes returned — store login state
    _loginToken = data.access_token;

    // Show backup codes
    $('step-tfa-setup').style.display = 'none';
    $('step-tfa-backup').style.display = 'block';
    $('tfa-backup-display').textContent = data.backup_codes.join('\n');
  } catch(e) {
    $('tfa-setup-error').textContent = '网络错误';
    $('tfa-setup-error').style.display = 'block';
  }
}

// ---- Step 4: backup codes ----
let _loginToken = '';

function copyBackupCodes() {
  const text = $('tfa-backup-display').textContent;
  navigator.clipboard.writeText(text).catch(() => {});
  alert('恢复码已复制到剪贴板');
}

function downloadBackupCodes() {
  const text = $('tfa-backup-display').textContent;
  const blob = new Blob(['LivePool 二次验证恢复码\n\n' + text + '\n\n每个恢复码只能使用一次，请妥善保管。\n'], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'livepool-backup-codes.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

function finishLogin() {
  // The JWT cookie was already set by /login/2fa/complete
  window.location = '/';
}

// ---- Registration ----
let _codeCheckTimer = null;

function showRegister() {
  $('step-login').style.display = 'none';
  $('step-register').style.display = 'block';
  $('error').style.display = 'none';
  $('reg-username').focus();
}

function showLogin() {
  $('step-register').style.display = 'none';
  $('step-login').style.display = 'block';
  $('error').style.display = 'none';
}

// Real-time invite code check
$('reg-code').addEventListener('input', function() {
  clearTimeout(_codeCheckTimer);
  const code = this.value.trim();
  if (code.length < 4) { $('reg-code-status').textContent = ''; return; }
  _codeCheckTimer = setTimeout(async () => {
    try {
      const resp = await fetch('/api/auth/register/check-code?code=' + encodeURIComponent(code));
      const data = await resp.json();
      $('reg-code-status').textContent = data.valid ? '✅' : '❌';
    } catch(e) {
      $('reg-code-status').textContent = '';
    }
  }, 500);
});

// Submit registration
$('register-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const username = $('reg-username').value.trim();
  const password = $('reg-password').value;
  const confirm = $('reg-confirm').value;
  const code = $('reg-code').value.trim();

  $('error').style.display = 'none';

  if (!username || !password || !code) {
    showError('请填写所有字段');
    return;
  }
  if (password.length < 4) {
    showError('密码至少 4 位');
    return;
  }
  if (password !== confirm) {
    showError('两次密码输入不一致');
    return;
  }

  try {
    const resp = await fetch('/api/auth/register', {
      method: 'POST',
      body: new URLSearchParams({username, password, invite_code: code}),
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    });
    if (resp.redirected) { window.location = resp.url; return; }
    if (resp.ok) { window.location = '/'; return; }
    const data = await resp.json();
    showError(data.detail || '注册失败');
  } catch(e) {
    showError('网络错误');
  }
});
</script>

</body>
</html>
