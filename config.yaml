auth:
  default_admin_password: admin
  jwt_secret: livepool-secret-change-me-in-production
  token_expire_hours: 24
classifier:
  default_group: 其他
  mapping_file: data/channels.json
collector:
  crawlers:
  - enabled: true
    name: github_iptv_org
    type: github_m3u
    urls:
    - https://raw.githubusercontent.com/iptv-org/iptv/master/channels.m3u
  - enabled: true
    name: fanmingming_ipv6
    type: raw_m3u
    urls:
    - https://raw.githubusercontent.com/fanmingming/live/main/tv/m3u/ipv6.m3u
  - enabled: true
    name: yuechan_live
    type: raw_m3u
    urls:
    - https://raw.githubusercontent.com/YueChan/Live/main/IPTV.m3u
  local_seeds: []
  proxy: null
  timeout: 30
epg:
  source: http://epg.51zmt.top:8000/e.xml
generator:
  main_file: live.m3u8
  output_dir: data
logging:
  dir: data
  level: INFO
  max_files: 7
scheduler:
  cron: 0 */6 * * *
  timezone: Asia/Shanghai
validator:
  concurrency: 50
  connect_timeout: 2
  content_min_bytes: 256
  deep_check: true
  proxy: null
  read_timeout: 8
  retry: 1
  segment_check: true
  total_timeout: 10
  user_agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML,
    like Gecko) Chrome/149.0.0.0 Safari/537.36
web:
  api_docs: true
  cors: true
  host: 0.0.0.0
  port: 8008
